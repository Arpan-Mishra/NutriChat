<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriChat</title>
    <style>
        :root { color-scheme: light dark; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 600px;
            margin: 80px auto;
            padding: 24px 16px;
            text-align: center;
            color: #1d1d1f;
            background: #fff;
        }
        @media (prefers-color-scheme: dark) {
            body { color: #f5f5f7; background: #1d1d1f; }
            a { color: #6eb5ff; }
        }
        h1 { font-size: 36px; margin-bottom: 8px; }
        .tagline { font-size: 18px; color: #86868b; margin-bottom: 40px; }
        .links { display: flex; flex-direction: column; gap: 12px; align-items: center; }
        .links a {
            font-size: 16px;
            padding: 12px 24px;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            text-decoration: none;
            color: inherit;
            min-width: 200px;
        }
        .links a:hover { background: #f5f5f7; }
        @media (prefers-color-scheme: dark) {
            .links a { border-color: #424245; }
            .links a:hover { background: #2d2d2f; }
        }
    </style>
</head>
<body>
    <h1>NutriChat</h1>
    <p class="tagline">Track your nutrition, right on WhatsApp</p>
    <div class="links">
        <a href="privacy-policy.html">Privacy Policy</a>
        <a href="https://github.com/Arpan-Mishra/NutriChat/issues">Support</a>
        <a href="https://github.com/Arpan-Mishra/NutriChat">GitHub</a>
    </div>
</body>
</html>
